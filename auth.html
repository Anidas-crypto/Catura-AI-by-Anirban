<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Catura AI — Login</title>

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #0d0d0d;
      color: #e5e5e5;
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }

    .card {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 18px;
      padding: 2rem;
      width: 100%;
      max-width: 390px;
    }

    .logo-area {
      text-align: center;
      margin-bottom: 1.75rem;
    }

    .logo-box {
      width: 46px;
      height: 46px;
      background: #10a37f;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 12px;
      font-size: 22px;
      color: white;
      font-weight: 600;
    }

    .logo-area h1 {
      font-size: 18px;
      font-weight: 600;
    }

    .logo-area p {
      font-size: 13px;
      color: #888;
    }

    .tabs {
      display: flex;
      background: #111;
      border-radius: 10px;
      padding: 3px;
      gap: 3px;
      margin-bottom: 1.5rem;
    }

    .tab {
      flex: 1;
      padding: 8px;
      border-radius: 8px;
      border: none;
      font-size: 13px;
      cursor: pointer;
      background: transparent;
      color: #888;
    }

    .tab.active {
      background: #10a37f;
      color: white;
    }

    .oauth-btn {
      width: 100%;
      padding: 10px;
      margin-bottom: 8px;
      background: #111;
      border: 1px solid #2a2a2a;
      border-radius: 10px;
      color: white;
      cursor: pointer;
    }

    .divider {
      text-align: center;
      margin: 12px 0;
      color: #555;
    }

    input {
      width: 100%;
      padding: 10px;
      margin-bottom: 10px;
      background: #111;
      border: 1px solid #2a2a2a;
      border-radius: 10px;
      color: white;
    }

    .submit {
      width: 100%;
      padding: 10px;
      background: #10a37f;
      border: none;
      border-radius: 10px;
      color: white;
      cursor: pointer;
    }

    .msg {
      margin-top: 10px;
      text-align: center;
    }

    .error { color: red; }
    .success { color: lightgreen; }
  </style>
</head>

<body>

<div class="card">

  <div class="logo-area">
    <div class="logo-box">C</div>
    <h1>Catura AI</h1>
    <p>Login or create account</p>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('login')">Login</button>
    <button class="tab" onclick="switchTab('signup')">Sign Up</button>
  </div>

  <button class="oauth-btn" onclick="doGoogle()">Continue with Google</button>
  <button class="oauth-btn" onclick="doGitHub()">Continue with GitHub</button>

  <div class="divider">or</div>

  <input type="email" id="email" placeholder="Email">
  <input type="password" id="password" placeholder="Password">
  <input type="password" id="confirm" placeholder="Confirm Password" style="display:none;">

  <button class="submit" onclick="doSubmit()" id="submitBtn">Login</button>

  <div class="msg" id="msg"></div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPABASE_URL = "https://zhrjmnrfklzuxmfbdqhg.supabase.co";
const SUPABASE_KEY = "sb_publishable_aIbByN1rFc9V3AH41Kyz6A_e1XppA1Z";

const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY, {
  auth: {
    persistSession: true,
    autoRefreshToken: true
  }
});

// ✅ FIX: Handle OAuth return
sb.auth.onAuthStateChange((event, session) => {
  if (session?.user) {
    window.location.href = "/";
  }
});

// ✅ FIX: redirect if already logged in
sb.auth.getSession().then(({ data }) => {
  if (data.session) {
    window.location.href = "/";
  }
});

let currentTab = "login";

function switchTab(tab) {
  currentTab = tab;
  const isLogin = tab === "login";

  document.getElementById("tab-login").className  = "tab" + (isLogin ? " active" : "");
  document.getElementById("tab-signup").className = "tab" + (!isLogin ? " active" : "");

  document.getElementById("confirmField").style.display = isLogin ? "none" : "block";
  document.getElementById("forgotBtn").style.display = isLogin ? "inline" : "none";

  document.getElementById("submitBtn").textContent =
    isLogin ? "Log in" : "Create account";

  clearMsg();
}

function showMsg(text, type) {
  const el = document.getElementById("msg");
  el.textContent = text;
  el.className = "msg " + type;
}

function clearMsg() {
  document.getElementById("msg").className = "msg";
}

// ============================
// EMAIL LOGIN / SIGNUP
// ============================
async function doSubmit() {
  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value;

  if (!email || !password) {
    return showMsg("Please fill all fields", "error");
  }

  if (currentTab === "signup") {
    const confirm = document.getElementById("confirm").value;

    if (password !== confirm) {
      return showMsg("Passwords do not match", "error");
    }

    const { error } = await sb.auth.signUp({ email, password });

    if (error) return showMsg(error.message, "error");

    showMsg("Check email to confirm account", "success");

  } else {
    const { error } = await sb.auth.signInWithPassword({ email, password });

    if (error) return showMsg(error.message, "error");

    window.location.href = "/";
  }
}

// ============================
// 🔥 OAUTH FIX (VERY IMPORTANT)
// ============================
async function doGoogle() {
  await sb.auth.signInWithOAuth({
    provider: "google",
    options: {
      redirectTo: "https://my-ai-assistant-9bbd.onrender.com/"
    }
  });
}

async function doGitHub() {
  await sb.auth.signInWithOAuth({
    provider: "github",
    options: {
      redirectTo: "https://my-ai-assistant-9bbd.onrender.com/"
    }
  });
}

// ============================
// 🔥 RESET PASSWORD FIX
// ============================
async function doForgot() {
  const email = document.getElementById("email").value.trim();

  if (!email) return showMsg("Enter email first", "error");

  const { error } = await sb.auth.resetPasswordForEmail(email, {
    redirectTo: "https://my-ai-assistant-9bbd.onrender.com/auth.html"
  });

  if (error) showMsg(error.message, "error");
  else showMsg("Reset email sent", "success");
}

document.addEventListener("keydown", e => {
  if (e.key === "Enter") doSubmit();
});
</script>
