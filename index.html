<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Catura AI is a free AI chatbot assistant like ChatGPT and Claude.">
    <meta name="robots" content="index, follow">
    <meta name="google-site-verification" content="qiQ1Xx00fMsEhl6f4cmRXiJg-16rT3M_sg4kDAt5y1Q" />
    <title>Catura AI</title>
    <link rel="icon" type="image/png" href="static/logos.png">
    <link rel="stylesheet" href="static/style.css">
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#000000" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Catura AI" />
    <link rel="apple-touch-icon" href="/static/icons/icon-192.png" />
</head>
<body>

    <!-- Mobile overlay backdrop -->
    <div class="sidebar-overlay" id="sidebarOverlay" onclick="closeSidebar()"></div>

    <!-- =============================================
         ICON RAIL — slim column, always visible on desktop
         Shown when full sidebar is collapsed
    ============================================= -->
    <div class="icon-rail" id="iconRail">

        <button class="rail-btn" onclick="toggleSidebar()" title="Open Sidebar">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                <rect x="2" y="3" width="20" height="18" rx="3"/>
                <line x1="8" y1="3" x2="8" y2="21"/>
                <polyline points="11,9 13,12 11,15"/>
            </svg>
        </button>

        <div class="rail-divider"></div>

        <button class="rail-btn" onclick="newChat()" title="New Chat">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path>
                <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path>
            </svg>
        </button>

        <button class="rail-btn" onclick="openSidebarTo('history')" title="Chat History">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="10"></circle>
                <polyline points="12 6 12 12 16 14"></polyline>
            </svg>
        </button>

        <button class="rail-btn" onclick="showSettings()" title="Settings">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="3"></circle>
                <path d="M12 1v6m0 6v6m10.39-9.39l-4.24 4.24m-8.3 0l-4.24-4.24m12.53 8.53l4.24 4.24m-8.3 0l4.24-4.24"></path>
            </svg>
        </button>

        <div class="rail-spacer"></div>

        <button class="rail-btn rail-avatar" id="railAvatar" onclick="showSettings()" title="Profile & Settings">?</button>

        <button class="rail-btn rail-logout" onclick="logoutUser()" title="Logout">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
                <polyline points="16 17 21 12 16 7"></polyline>
                <line x1="21" y1="12" x2="9" y2="12"></line>
            </svg>
        </button>

    </div>

    <!-- =============================================
         FULL SIDEBAR — expanded panel
    ============================================= -->
    <div class="sidebar open" id="sidebar">

        <div class="sidebar-header">
            <!-- Collapse toggle lives INSIDE sidebar header -->
            <button class="sidebar-inner-toggle" onclick="toggleSidebar()" title="Collapse Sidebar">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="2" y="3" width="20" height="18" rx="3"/>
                    <line x1="8" y1="3" x2="8" y2="21"/>
                    <polyline points="12,9 10,12 12,15"/>
                </svg>
            </button>
            <span class="sidebar-brand">
                <img src="static/logo.png" alt="Catura AI Logo" class="sidebar-logo"> Catura AI
            </span>
            <!-- Mobile-only X close -->
            <button class="close-btn" onclick="closeSidebar()">✕</button>
        </div>

        <div class="sidebar-menu">
            <div class="sidebar-item" onclick="newChat()">
                <svg class="sidebar-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path>
                    <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path>
                </svg>
                New Chat
            </div>
            <div class="sidebar-item" onclick="showHistory()">
                <svg class="sidebar-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="10"></circle>
                    <polyline points="12 6 12 12 16 14"></polyline>
                </svg>
                Chat History
            </div>
            <div class="sidebar-item" onclick="showSettings()">
                <svg class="sidebar-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="3"></circle>
                    <path d="M12 1v6m0 6v6m10.39-9.39l-4.24 4.24m-8.3 0l-4.24-4.24m12.53 8.53l4.24 4.24m-8.3 0l4.24-4.24"></path>
                </svg>
                Settings
            </div>
        </div>

        <div class="sidebar-bottom">
            <div class="user-profile">
                <div class="user-avatar" id="userAvatar">?</div>
                <span class="user-fullname" id="userFullname">Loading...</span>
            </div>
            <div class="sidebar-item logout" onclick="logoutUser()">
                <svg class="sidebar-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
                    <polyline points="16 17 21 12 16 7"></polyline>
                    <line x1="21" y1="12" x2="9" y2="12"></line>
                </svg>
                Logout
            </div>
        </div>

    </div>

    <!-- =============================================
         MAIN APP
    ============================================= -->
    <div class="app" id="app">

        <!-- Settings Overlay -->
        <div id="settingsOverlay" class="settings-overlay"></div>

        <div class="header">
            <span>Catura AI</span>
            <div style="width:38px"></div>
        </div>

        <div id="chatbox"></div>

        <div class="input-area center" id="inputArea">
            <textarea id="input" placeholder="Message Catura AI..." rows="1"></textarea>
            <button onclick="sendMessage()">➤</button>
        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="static/logic.js"></script>

    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/service-worker.js')
                    .then(() => console.log('✅ Catura AI PWA Ready'))
                    .catch((err) => console.log('❌ SW Error:', err));
            });
        }
    </script>
</body>
</html>
