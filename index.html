<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Catura AI is a free AI chatbot assistant like ChatGPT and Claude.">
    <meta name="robots" content="index, follow">
    <meta name="google-site-verification" content="qiQ1Xx00fMsEhl6f4cmRXiJg-16rT3M_sg4kDAt5y1Q" />
    
    <!-- ✅ CACHE BUSTING - NEVER CACHE HTML -->
    <meta http-equiv="cache-control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="pragma" content="no-cache">
    <meta http-equiv="expires" content="0">
    
    <title>Catura AI</title>
    <link rel="icon" type="image/png" href="static/logos.png">
    
    <!-- ✅ CACHE BUSTING - VERSION PARAMETER -->
    <link rel="stylesheet" href="static/style.css?v=26.3.0">
    
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#000000" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Catura AI" />
    <link rel="apple-touch-icon" href="/static/icons/icon-192.png" />
</head>
<body>

    <!-- Mobile overlay backdrop -->
    <div class="sidebar-overlay" id="sidebarOverlay" onclick="closeSidebar()"></div>

    <!-- =============================================
         ICON RAIL — slim column, always visible on desktop
         Shown when full sidebar is collapsed
    ============================================= -->
    <div class="icon-rail" id="iconRail">

        <button class="rail-btn" onclick="toggleSidebar()" title="Open Sidebar">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                <rect x="2" y="3" width="20" height="18" rx="3"/>
                <line x1="8" y1="3" x2="8" y2="21"/>
                <polyline points="11,9 13,12 11,15"/>
            </svg>
        </button>

        <div class="rail-divider"></div>

        <button class="rail-btn" onclick="newChat()" title="New Chat">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path>
                <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path>
            </svg>
        </button>

        <button class="rail-btn" onclick="openSidebarTo('history')" title="Chat History">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="10"></circle>
                <polyline points="12 6 12 12 16 14"></polyline>
            </svg>
        </button>

        <button class="rail-btn" onclick="showSettings()" title="Settings">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="3"></circle>
                <path d="M12 1v6m0 6v6m10.39-9.39l-4.24 4.24m-8.3 0l-4.24-4.24m12.53 8.53l4.24 4.24m-8.3 0l4.24-4.24"></path>
            </svg>
        </button>

        <div class="rail-spacer"></div>

        <button class="rail-btn rail-avatar" id="railAvatar" onclick="showSettings()" title="Profile & Settings">?</button>

        <button class="rail-btn rail-logout" onclick="logoutUser()" title="Logout">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
                <polyline points="16 17 21 12 16 7"></polyline>
                <line x1="21" y1="12" x2="9" y2="12"></line>
            </svg>
        </button>

    </div>

    <!-- =============================================
         FULL SIDEBAR — expanded panel
    ============================================= -->
    <div class="sidebar open" id="sidebar">

        <div class="sidebar-header">
            <!-- Collapse toggle lives INSIDE sidebar header -->
            <button class="sidebar-inner-toggle" onclick="toggleSidebar()" title="Collapse Sidebar">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="2" y="3" width="20" height="18" rx="3"/>
                    <line x1="8" y1="3" x2="8" y2="21"/>
                    <polyline points="12,9 10,12 12,15"/>
                </svg>
            </button>
            <span class="sidebar-brand">
                <img src="static/logo.png" alt="Catura AI Logo" class="sidebar-logo"> Catura AI
            </span>
            <!-- Mobile-only X close -->
            <button class="close-btn" onclick="closeSidebar()">✕</button>
        </div>

        <div class="sidebar-menu">
            <div class="sidebar-item" onclick="newChat()">
                <svg class="sidebar-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path>
                    <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path>
                </svg>
                New Chat
            </div>
            <div class="sidebar-item" onclick="showHistory()">
                <svg class="sidebar-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="10"></circle>
                    <polyline points="12 6 12 12 16 14"></polyline>
                </svg>
                Chat History
            </div>
            <div class="sidebar-item" onclick="showSettings()">
                <svg class="sidebar-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="3"></circle>
                    <path d="M12 1v6m0 6v6m10.39-9.39l-4.24 4.24m-8.3 0l-4.24-4.24m12.53 8.53l4.24 4.24m-8.3 0l4.24-4.24"></path>
                </svg>
                Settings
            </div>
        </div>

        <div class="sidebar-bottom">
            <div class="user-profile">
                <div class="user-avatar" id="userAvatar">?</div>
                <span class="user-fullname" id="userFullname">Loading...</span>
            </div>
            <div class="sidebar-item logout" onclick="logoutUser()">
                <svg class="sidebar-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
                    <polyline points="16 17 21 12 16 7"></polyline>
                    <line x1="21" y1="12" x2="9" y2="12"></line>
                </svg>
                Logout
            </div>
        </div>

    </div>

    <!-- =============================================
         MAIN APP
    ============================================= -->
    <div class="app" id="app">

        <!-- Settings Overlay -->
        <div id="settingsOverlay" class="settings-overlay"></div>

        <div id="chatbox"></div>

        <div class="input-area center" id="inputArea">
            <!-- Top row: textarea -->
            <div class="input-row-top">
                <textarea id="input" placeholder="Message Catura AI..." rows="1"></textarea>
            </div>
            <!-- Bottom row: + button left, send button right -->
            <div class="input-row-bottom">
                <!-- Plus button with dropdown -->
                <div class="plus-menu-wrap" id="plusMenuWrap">
                    <button class="plus-btn" id="plusBtn" onclick="togglePlusMenu(event)" title="More options">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                            <line x1="12" y1="5" x2="12" y2="19"></line>
                            <line x1="5" y1="12" x2="19" y2="12"></line>
                        </svg>
                    </button>
                    <!-- Dropdown menu -->
                    <div class="plus-dropdown" id="plusDropdown">
                        <div class="plus-dropdown-item" onclick="handlePlusAction('file')">
                            <span class="plus-item-icon">
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"></path>
                                </svg>
                            </span>
                            <span>Add files &amp; photos</span>
                        </div>
                        <div class="plus-dropdown-item" onclick="handlePlusAction('connect')">
                            <span class="plus-item-icon">
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"></path>
                                    <path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"></path>
                                </svg>
                            </span>
                            <span>Connect apps</span>
                        </div>
                        <div class="plus-dropdown-divider"></div>
                        <div class="plus-dropdown-item" onclick="handlePlusAction('think')">
                            <span class="plus-item-icon">
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <circle cx="12" cy="12" r="10"></circle>
                                    <path d="M12 16v-4"></path>
                                    <path d="M12 8h.01"></path>
                                </svg>
                            </span>
                            <span>Think</span>
                        </div>
                        <div class="plus-dropdown-item" onclick="handlePlusAction('research')">
                            <span class="plus-item-icon">
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <circle cx="11" cy="11" r="8"></circle>
                                    <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                                </svg>
                            </span>
                            <span>Deep research</span>
                        </div>
                        <div class="plus-dropdown-item" onclick="handlePlusAction('search')">
                            <span class="plus-item-icon">
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <circle cx="12" cy="12" r="10"></circle>
                                    <line x1="2" y1="12" x2="22" y2="12"></line>
                                    <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"></path>
                                </svg>
                            </span>
                            <span>Web search</span>
                        </div>
                    </div>
                </div>

                <!-- MODEL SELECTOR (NEW) -->
                <div class="model-selector-wrap" id="modelSelectorWrap">
                    <button class="model-selector-btn" id="modelSelectorBtn" onclick="toggleModelSelector(event)" title="Choose AI Model">
                        <span class="model-name" id="modelName">Dagr</span>
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                            <polyline points="6 9 12 15 18 9"></polyline>
                        </svg>
                    </button>
                    <!-- Model selector dropdown -->
                    <div class="model-dropdown" id="modelDropdown">
                        <div class="model-dropdown-header">Choose AI Model</div>
                        <div class="model-option active" data-model="dagr" data-name="Dagr" onclick="selectModel('dagr', 'Dagr')">
                            <div class="model-option-icon">
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
                                    <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8zm3.5-9c.83 0 1.5-.67 1.5-1.5S16.33 8 15.5 8 14 8.67 14 9.5s.67 1.5 1.5 1.5zm-7 0c.83 0 1.5-.67 1.5-1.5S9.33 8 8.5 8 7 8.67 7 9.5 7.67 11 8.5 11zm3.5 6.5c2.33 0 4.31-1.46 5.11-3.5H6.89c.8 2.04 2.78 3.5 5.11 3.5z"/>
                                </svg>
                            </div>
                            <div class="model-option-info">
                                <div class="model-option-name">Dagr</div>
                                <div class="model-option-desc">Current Model</div>
                            </div>
                            <div class="model-option-check">✓</div>
                        </div>
                        <div class="model-dropdown-divider"></div>
                        <div class="model-dropdown-footer">
                            <div class="model-coming-soon">
                                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <circle cx="12" cy="12" r="10"></circle>
                                    <polyline points="12 6 12 12 16 14"></polyline>
                                </svg>
                                <span>More models coming soon</span>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="input-bottom-spacer"></div>

                <!-- Send button -->
                <button class="send-btn" onclick="sendMessage()" id="sendBtn">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="12" y1="19" x2="12" y2="5"></line>
                        <polyline points="5 12 12 5 19 12"></polyline>
                    </svg>
                </button>
            </div>
        </div>

        <!-- Hidden file input for file upload -->
        <input type="file" id="fileInput" multiple accept="image/*,.pdf,.txt,.doc,.docx,.csv" style="display:none" onchange="handleFileSelect(event)">

    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <!-- ✅ CACHE BUSTING - VERSION PARAMETER -->
    <script src="static/logic.js?v=26.3.0"></script>

    <script>
        // ✅ VERSION INFO FOR DEBUGGING
        console.log('🚀 Catura AI v26.3.0 loaded');
        
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/service-worker.js?v=26.3.0')
                    .then(() => console.log('✅ Catura AI PWA Ready - v26.3.0'))
                    .catch((err) => console.log('❌ SW Error:', err));
            });
        }
    </script>
</body>
</html>
